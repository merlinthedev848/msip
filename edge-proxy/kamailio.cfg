#!KAMAILIO

# Minimal configuration for SIP Edge Proxy
# Anti-scanner, basic routing.

debug=2
log_stderror=no
log_facility=LOG_LOCAL0

children=4

# Listen on all interfaces
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

loadmodule "sl.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "siputils.so"

loadmodule "nathelper.so"
loadmodule "siptrace.so"

# SIP Trace Configuration for Homer / HEP
modparam("siptrace", "duplicate_uri", "sip:pbx_heplify_server:9060")
modparam("siptrace", "hep_mode_on", 1)
modparam("siptrace", "trace_to_database", 0)

request_route {
    # Mirror all incoming SIP requests to Homer
    sip_trace();

    # Per-request initial checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check()) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # Drop scanner attempts (like sipvicious)
    if ($ua =~ "friendly-scanner" || $ua =~ "sipcli") {
        xlog("L_ALERT", "Scanner dropped: $si\n");
        drop;
    }

    # NAT Detection and Correction
    if (nat_uac_test("19")) {
        xlog("L_INFO", "NAT detected for $si:$sp - fixing contact\n");
        fix_nated_contact();
        force_rport();
    }

    # Pass through routing to FreeSWITCH (Internal Media Core)
    # Forwarding all valid SIP requests to the internal FreeSWITCH instance
    forward("pbx_freeswitch", 5060);
    exit;
}
