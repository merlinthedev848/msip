version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pbx_db
    environment:
      POSTGRES_USER: ${DB_USER:-pbxuser}
      POSTGRES_PASSWORD: ${DB_PASS:-pbxpass}
      POSTGRES_DB: ${DB_NAME:-pbx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pbx_backend
    environment:
      - DATABASE_URL=postgres://${DB_USER:-pbxuser}:${DB_PASS:-pbxpass}@postgres:5432/${DB_NAME:-pbx}?sslmode=disable
    volumes:
      - pbx_recordings:/var/lib/pbx/recordings
    depends_on:
      - postgres
    networks:
      - internal
    restart: unless-stopped

  gateway:
    image: devopsfaith/krakend:latest
    container_name: pbx_gateway
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json:ro
    command: run -d -c /etc/krakend/krakend.json
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - internal
      - external
    restart: unless-stopped

  kamailio:
    image: ghcr.io/kamailio/kamailio:6.1.3-bullseye
    container_name: pbx_kamailio
    volumes:
      - ./edge-proxy/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    networks:
      - external
      - internal
    restart: unless-stopped

  freeswitch:
    image: safarov/freeswitch:latest
    container_name: pbx_freeswitch
    volumes:
      - ./telephony-core/freeswitch.xml:/usr/local/freeswitch/conf/freeswitch.xml:ro
      - ./telephony-core/certs:/usr/local/freeswitch/certs:ro
      - pbx_recordings:/usr/local/freeswitch/recordings
    ports:
      - "5066:5066"
      - "7443:7443"
    networks:
      - internal
      - external
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pbx_frontend
    ports:
      - "80:80"
    networks:
      - external
    restart: unless-stopped

  homer-db:
    image: postgres:15-alpine
    container_name: pbx_homer_db
    environment:
      - POSTGRES_USER=homer
      - POSTGRES_PASSWORD=homer
      - POSTGRES_DB=homer_data
    networks:
      - internal
    restart: unless-stopped

  heplify-server:
    image: sipcapture/heplify-server:latest
    container_name: pbx_heplify_server
    ports:
      - "9060:9060/udp"
      - "9060:9060/tcp"
    command: ./heplify-server
    environment:
      - HEPLIFYSERVER_DBDRIVER=postgres
      - HEPLIFYSERVER_DBADDR=homer-db:5432
      - HEPLIFYSERVER_DBUSER=homer
      - HEPLIFYSERVER_DBPASS=homer
      - HEPLIFYSERVER_DBSHEMA=homer7
      - HEPLIFYSERVER_DBDATATABLE=homer_data
    depends_on:
      - homer-db
    networks:
      - internal
    restart: unless-stopped

  homer-app:
    image: ghcr.io/sipcapture/homer-app:latest
    container_name: pbx_homer_app
    environment:
      - DB_HOST=homer-db
      - DB_USER=homer
      - DB_PASS=homer
      - DB_NAME=homer_data
    ports:
      - "9080:80"
    depends_on:
      - homer-db
    networks:
      - internal
      - external
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: pbx_coturn
    command: >
      --log-file=stdout
      --listening-port=3478
      --listening-ip=0.0.0.0
      --external-ip=$${EXTERNAL_IP:-127.0.0.1}
      --min-port=49152
      --max-port=65535
      --user=pbxuser:pbxpass
      --realm=pbx.local
      --verbose
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    networks:
      - external
    restart: unless-stopped

volumes:
  pgdata:
  homer_pgdata:
  pbx_recordings:

networks:
  internal:
    internal: true
  external:
